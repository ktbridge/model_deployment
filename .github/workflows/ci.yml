name: CI Pipeline

# 1. Trigger this pipeline whenever code is pushed to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    # 2. Run this on a fresh, cloud-hosted Ubuntu Linux machine
    runs-on: ubuntu-latest

    steps:
    # 3. Clone your repository code onto the cloud machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Install Python 3.10 on the cloud machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 5. Install all your project dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 6. Pull the model data using DVC (mocked/skipped here if no cloud storage is configured yet)
    # - name: Pull Data and Model via DVC
    #   run: |
    #     pip install dvc
    #     # dvc pull <-- If you have remote storage set up later, this goes here

    # 6. Create a mock model file since DVC cloud storage isn't connected yet
    - name: Mock DVC Model File
      run: |
        pip install onnx
        python -c "
        import onnx
        from onnx import helper, TensorProto
        node = helper.make_node('Identity', ['input'], ['output'])
        
        # Adjust dimensions from [1, 10] to [1, 2] to match a 2-feature input matrix
        graph = helper.make_graph([node], 'dummy_graph', 
            [helper.make_tensor_value_info('input', TensorProto.FLOAT, [1, 2])], 
            [helper.make_tensor_value_info('output', TensorProto.FLOAT, [1, 2])])
        
        opset = helper.make_operatorsetid('', 15)
        model = helper.make_model(graph, producer_name='mock', ir_version=11, opset_imports=[opset])
        
        import os; os.makedirs('models', exist_ok=True)
        onnx.save(model, 'models/housing_model.onnx')
        "

    # 7. Run your entire local test suite (Pytest + Great Expectations + Schemathesis)
    - name: Run Test Suite
      run: |
        pytest

    # 8. Test that the Docker image builds flawlessly
    - name: Verify Docker Build
      run: |
        docker build -t housing-api .